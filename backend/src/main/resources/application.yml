server:
  port: 8089
  servlet:
    context-path: /aria

spring:
  application:
    name: aria-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aria_db}
    username: ${SPRING_DATASOURCE_USERNAME:aria}
    password: ${SPRING_DATASOURCE_PASSWORD:aria_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:aria-jwt-secret-min-32-chars-long-2026}
  expiration-ms: 86400000   # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.aria: INFO
    org.springframework.security: WARN
