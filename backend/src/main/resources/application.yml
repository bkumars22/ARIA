server:
  port: ${PORT:8089}
  servlet:
    context-path: /aria

spring:
  application:
    name: aria-backend
  datasource:
    # Render provides individual parts; build JDBC URL from them
    # Local fallback uses localhost PostgreSQL
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aria_db}
    username: ${SPRING_DATASOURCE_USERNAME:aria}
    password: ${SPRING_DATASOURCE_PASSWORD:aria_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5          # stay within Render free tier connection limit
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:aria-jwt-secret-min-32-chars-long-2026}
  expiration-ms: 86400000           # 24 hours

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.aria: INFO
    org.springframework.security: WARN
